<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>AFR Telemetry Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      /* General page styling */
      body {
        font-family: sans-serif;
        color: #333;
        background-color: #f4f4f4;
        margin: 0;
      }

      /* Status bar for connection info */
      #status-bar {
        padding: 10px 20px;
        background: #333;
        color: #fff;
        font-weight: bold;
        border-bottom: 2px solid #000;
      }

      /* Responsive grid layout */
      .dashboard-grid {
        display: grid;
        gap: 15px;
        padding: 15px;

        /* Default to 3 equal columns for desktop*/
        grid-template-columns: repeat(3, 1fr);
      }

      /* Tablet: If the screen is smaller than 900px, switch to 2 columns */
      @media (max-width: 900px) {
        .dashboard-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      /* Phone: If the screen is smaller than 600px, switch to 1 column */
      @media (max-width: 600px) {
        .dashboard-grid {
          grid-template-columns: 1fr;
        }
      }

      /* Individual card styling */
      .card {
        border: 1px solid #000;
        padding: 15px;
        background-color: #fff;
        display: flex;
        flex-direction: column;
      }

      .card-header {
        font-size: 0.8rem;
        font-weight: bold;
        text-transform: uppercase;
        color: #555;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #eee;
        padding-bottom: 5px;
      }

      .card-value {
        font-size: 3rem;
        font-weight: bold;
        text-align: center;
        margin: 10px 0;
      }

      /* Ensures charts stay inside the cards */
      .chart-container {
        width: 100%;
        height: 180px;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      button {
        font-size: 0.7rem;
        cursor: pointer;
        padding: 2px 5px;
      }
    </style>
  </head>
  <body>
    <div id="status-bar">
      AFR Telemetry - Status: <span id="conn-status">Disconnected</span>
    </div>

    <div class="dashboard-grid">
      <div class="card" id="engine-card">
        <div class="card-header">Engine Temperatures</div>
        <div class="card-value"><span id="c1_main">--</span>&deg;C</div>
        <div
          style="
            display: flex;
            justify-content: space-around;
            margin-bottom: 10px;
            font-weight: bold;
          "
        >
          <div>Air: <span id="air_data">--</span>&deg;C</div>
          <div>Out: <span id="c2_data">--</span>&deg;C</div>
        </div>
        <div class="chart-container">
          <canvas id="thermal_chart"></canvas>
        </div>
      </div>

      <div class="card" id="imu-card">
        <div class="card-header">
          IMU Data (Pitch)
          <button onclick="offsetYaw()">Reset Yaw</button>
        </div>
        <div class="card-value"><span id="pitch_main">--</span>&deg;</div>
        <div class="chart-container">
          <canvas id="imu_chart"></canvas>
        </div>
      </div>

      <div class="card" id="gforce-card">
        <div class="card-header">G-Force Data</div>
        <div class="card-value"><span id="accel_main">--</span> G</div>
        <div class="chart-container">
          <canvas id="accel_chart"></canvas>
        </div>
      </div>

      <div class="card" id="steering-card">
        <div class="card-header">Steering Input</div>
        <div class="card-value"><span id="steer_main">--</span>&deg;</div>
        <div class="chart-container">
          <canvas id="steering_chart"></canvas>
        </div>
      </div>

      <div class="card" id="suspension-card">
        <div class="card-header">Suspension Travel</div>
        <div class="card-value"><span id="susp_main">--</span> mm</div>
        <div class="chart-container">
          <canvas id="suspension_chart"></canvas>
        </div>
      </div>
    </div>

    <script>
      const maxDataPoints = 50;
      let currentYaw = 0;
      let yawOffset = 0;

      function offsetYaw() {
        yawOffset = currentYaw;
        console.log("Yaw offset set to " + yawOffset);
      }

      // thermal chart settings
      const thermalData = {
        labels: [],
        datasets: [
          {
            label: "In (C1)",
            data: [],
            borderColor: "red",
            borderWidth: 2,
            fill: false,
            pointRadius: 0,
          },
          {
            label: "Air",
            data: [],
            borderColor: "blue",
            borderWidth: 2,
            fill: false,
            pointRadius: 0,
          },
          {
            label: "Out (C2)",
            data: [],
            borderColor: "green",
            borderWidth: 2,
            fill: false,
            pointRadius: 0,
          },
        ],
      };

      // imu (pitch) chart settings
      const imuData = {
        labels: [],
        datasets: [
          {
            label: "Pitch",
            data: [],
            borderColor: "#f55442",
            borderWidth: 2,
            fill: false,
            pointRadius: 0,
          },
          {
            label: "Roll",
            data: [],
            borderColor: "#42f542",
            borderWidth: 2,
            fill: false,
            pointRadius: 0,
          },
          {
            label: "Yaw",
            data: [],
            borderColor: "#4272f5",
            borderWidth: 2,
            fill: false,
            pointRadius: 0,
          },
        ],
      };

      // acceleration chart settings
      const accelData = {
        labels: [],
        datasets: [
          {
            label: "X",
            data: [],
            borderColor: "#f55442",
            borderWidth: 2,
            fill: false,
            pointRadius: 0,
          },
          {
            label: "Y",
            data: [],
            borderColor: "#42f542",
            borderWidth: 2,
            fill: false,
            pointRadius: 0,
          },
          {
            label: "Z",
            data: [],
            borderColor: "#4272f5",
            borderWidth: 2,
            fill: false,
            pointRadius: 0,
          },
        ],
      };

      // steering angle chart settings
      const steeringData = {
        labels: [],
        datasets: [
          {
            data: [4096, 4096, 0],
            backgroundColor: ["#FF6384", "#36A2EB", "#eee"], // red, blue, and grey spot
            borderWidth: 0,
          },
        ],
      };

      // linear pot chart settings
      const linearPotData = {
        labels: [],
        datasets: [
          {
            label: "Shock 1",
            data: [],
            borderColor: "#4CAF50",
            borderWidth: 2,
            fill: false,
            pointRadius: 0,
          },
        ],
      };

      // create thermal graph
      const thermalCtx = document
        .getElementById("thermal_chart")
        .getContext("2d");
      const thermalChart = new Chart(thermalCtx, {
        type: "line",
        data: thermalData,
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
        },
      });

      // create imu pitch graph
      const imuCtx = document.getElementById("imu_chart").getContext("2d");
      const imuChart = new Chart(imuCtx, {
        type: "line",
        data: imuData,
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          scales: { y: { min: -90, max: 90 } },
        },
      });

      // create acceleration graph
      const accelCtx = document.getElementById("accel_chart").getContext("2d");
      const accelChart = new Chart(accelCtx, {
        type: "line",
        data: accelData,
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          scales: { y: { min: -5, max: 5 } },
        },
      });

      // create steering doughnut gauge
      const steeringCtx = document
        .getElementById("steering_chart")
        .getContext("2d");
      const steeringChart = new Chart(steeringCtx, {
        type: "doughnut",
        data: steeringData,
        options: {
          cutout: "80%",
          circumference: 270,
          rotation: -135,
          maintainAspectRatio: false,
          layout: {
            padding: {
              top: 10,
              bottom: 10,
            },
          },
        },
      });

      // create linear pot graph
      const lpCtx = document
        .getElementById("suspension_chart")
        .getContext("2d");
      const lpChart = new Chart(lpCtx, {
        type: "line",
        data: linearPotData,
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          scales: { y: { beginAtZero: true, max: 4096 } },
        },
      });

      // WebSocket (Connection) Logic
      // Automatically detects if we are on the car's IP or testing locally
      const host = window.location.hostname || "127.0.0.1";
      const gateway = `ws://${host}:8080/ws`;

      var ws = new WebSocket(gateway);

      // runs every time the ESP32 sends new data
      ws.onmessage = function (e) {
        const data = JSON.parse(e.data);

        // if sensor is unplugged (returns -1), show "No data" and grey out
        if (data.raw === -1) {
          document.getElementById("conn-status").innerText = "No data";
          document.getElementById("steer_main").innerText = "No data";
          steeringData.datasets[0].backgroundColor = ["#eee", "#eee", "#eee"];
        } else {
          // update the text labels with real numbers
          document.getElementById("conn-status").innerText = "Connected";
          steeringData.datasets[0].backgroundColor = [
            "#FF6384",
            "#36A2EB",
            "#eee",
          ];

          // update readouts
          document.getElementById("c1_main").innerText =
            data.c1 === -31.5 ? "--" : data.c1;
          document.getElementById("air_data").innerText =
            data.air === -31.5 ? "--" : data.air;
          document.getElementById("c2_data").innerText =
            data.c2 === -31.5 ? "--" : data.c2;
          document.getElementById("pitch_main").innerText =
            data.pitch === -31.5 ? "--" : data.pitch;
          document.getElementById("accel_main").innerText =
            data.yaccel === -1 ? "--" : data.yaccel;
          document.getElementById("steer_main").innerText =
            data.steer === -1 ? "--" : data.steer;
          document.getElementById("susp_main").innerText =
            data.raw === -1 ? "--" : data.raw;

          // push data to charts
          thermalData.labels.push(data.sample);
          thermalData.datasets[0].data.push(data.c1);
          thermalData.datasets[1].data.push(data.air);
          thermalData.datasets[2].data.push(data.c2);

          imuData.labels.push(data.sample);
          imuData.datasets[0].data.push(data.pitch);
          imuData.datasets[1].data.push(data.roll);
          imuData.datasets[2].data.push(data.yaw - yawOffset);
          currentYaw = imuData.datasets[2].data.at(-1);

          accelData.labels.push(data.sample);
          accelData.datasets[0].data.push(data.xaccel);
          accelData.datasets[1].data.push(data.yaccel);
          accelData.datasets[2].data.push(data.zaccel);

          linearPotData.labels.push(data.sample);
          linearPotData.datasets[0].data.push(data.raw);

          // update steering
          steeringData.datasets[0].data[0] = data.raw;
          steeringData.datasets[0].data[1] = 4096 - data.raw;
          steeringData.datasets[0].data[2] = 0;
        }

        // updates graph data
        const datasets = [thermalData, imuData, accelData, linearPotData];
        datasets.forEach((d) => {
          if (d.labels.length > maxDataPoints) {
            d.labels.shift();
            d.datasets.forEach((s) => s.data.shift());
          }
        });

        // refresh charts on screen
        thermalChart.update();
        imuChart.update();
        accelChart.update();
        steeringChart.update();
        lpChart.update();
      };

      // basic connection status updates
      ws.onopen = () => {
        document.getElementById("conn-status").innerText = "Connected";
      };
      ws.onerror = () => {
        document.getElementById("conn-status").innerText = "No Connection";
      };
    </script>
  </body>
</html>
